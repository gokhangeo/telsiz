<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anlık Telsiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- MQTT kütüphanesini Canvas dışı ortamlar için tutuyoruz -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background-color: #121212; color: #ffffff; overscroll-behavior: none; }
        .ptt-btn { background: linear-gradient(145deg, #ef4444, #dc2626); box-shadow: 0 10px 20px rgba(239, 68, 68, 0.4), inset 0 -3px 0 rgba(0,0,0,0.2); transition: all 0.1s; cursor: pointer; touch-action: none; }
        .ptt-btn.active { transform: translateY(5px); box-shadow: 0 5px 10px rgba(239, 68, 68, 0.4), inset 0 3px 0 rgba(0,0,0,0.2); background: linear-gradient(145deg, #dc2626, #b91c1c); }
        .radar-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid #ef4444; animation: radar 1.5s infinite ease-out; opacity: 0; display: none; }
        .ptt-btn.active .radar-ring { display: block; }
        @keyframes radar { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } }
        .speaker-hole { width: 8px; height: 8px; background: #222; border-radius: 50%; margin: 2px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden antialiased">

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const pttBtn = document.getElementById('ptt-btn');
            const statusText = document.getElementById('status-text');
            const FIXED_CHANNEL = "merkez_sabit_kanal_1"; 
            const currentTopic = "gtelsiz_v3_kanal_" + FIXED_CHANNEL;
            
            let mqttClient = null, mediaRecorder = null, audioChunks = [], isRecording = false;
            let audioPlayer = new Audio();

            // Güvenlik kısıtlamalarını aşmak için bağlantı simülasyonu
            const connectMQTT = () => {
                try {
                    // Sadece Canvas dışındaysak (gerçek tarayıcıdaysak) bağlan
                    if (window.location.hostname !== "") {
                        mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                        mqttClient.on('connect', () => {
                            mqttClient.subscribe(currentTopic);
                            statusText.innerText = "Dinleniyor...";
                        });
                    } else {
                        statusText.innerText = "Yerel Mod: Sunucu bağlantısı pasif.";
                    }
                } catch (e) {
                    statusText.innerText = "Bağlantı Hatası: Simülasyon modunda devam ediliyor.";
                }
            };

            // İlk dokunuşta ses kilidini aç
            document.body.addEventListener('pointerdown', () => {
                audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";
                audioPlayer.play().catch(()=>{});
            }, { once: true });

            // Bas-Konuş Olayları
            pttBtn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                pttBtn.classList.add('active');
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.start();
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                }).catch(err => console.log("Mikrofon izni gerekli"));
            });

            pttBtn.addEventListener('pointerup', (e) => {
                pttBtn.classList.remove('active');
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
            });

            connectMQTT();
        });
    </script>

    <div id="radio-screen" class="flex-1 flex flex-col bg-gray-900 justify-center items-center">
        <div class="relative w-48 h-48 flex items-center justify-center">
            <div id="ptt-btn" class="ptt-btn w-40 h-40 rounded-full flex flex-col items-center justify-center select-none relative z-10 border-4 border-red-900">
                <div class="radar-ring"></div>
                <i class="fa-solid fa-microphone text-4xl mb-2 text-white"></i>
                <span class="font-bold text-sm tracking-wider uppercase">Bas Konuş</span>
            </div>
        </div>
        <div id="status-text" class="text-gray-500 font-bold mt-12 uppercase">Hazır</div>
    </div>
</body>
</html>
