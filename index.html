<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anlık Telsiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Hesap gerektirmeyen anlık haberleşme kütüphanesi -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        /* iOS Safari Dokunmatik Tıklama Engellerini Kaldırma (Çok Önemli) */
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        body { 
            background-color: #121212; 
            color: #ffffff; 
            touch-action: manipulation; /* Çift tıklama yakınlaştırmasını önler */
        }
        .ptt-btn {
            background: linear-gradient(145deg, #ef4444, #dc2626);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.4), inset 0 -3px 0 rgba(0,0,0,0.2);
            transition: all 0.1s;
            cursor: pointer; /* iOS'un bunu tıklanabilir görmesi için şart */
        }
        /* iOS'ta basılı tutulduğunda (active) stili */
        .ptt-btn.active {
            transform: translateY(5px);
            box-shadow: 0 5px 10px rgba(239, 68, 68, 0.4), inset 0 3px 0 rgba(0,0,0,0.2);
            background: linear-gradient(145deg, #dc2626, #b91c1c);
        }
        .radar-ring {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid #ef4444;
            animation: radar 1.5s infinite ease-out;
            opacity: 0;
            display: none;
        }
        .ptt-btn.active .radar-ring { display: block; }
        @keyframes radar {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .speaker-hole {
            width: 8px; height: 8px; background: #222; border-radius: 50%; margin: 2px;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden antialiased">

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginScreen = document.getElementById('login-screen');
            const radioScreen = document.getElementById('radio-screen');
            const channelInput = document.getElementById('channel-input');
            const joinBtn = document.getElementById('join-btn');
            const pttBtn = document.getElementById('ptt-btn');
            const statusText = document.getElementById('status-text');
            const currentChannelDisplay = document.getElementById('current-channel');
            const leaveBtn = document.getElementById('leave-btn');
            const micErrorText = document.getElementById('mic-error-text');

            let mqttClient = null;
            let currentTopic = "";
            let mediaRecorder = null;
            let audioChunks = [];
            let isRecording = false;
            let isPlaying = false;
            let audioPlayer = new Audio();
            
            // Kullaniciya ozel rastgele kimlik
            const myClientId = 'user_' + Math.random().toString(16).substr(2, 8);
            
            // iOS mu Android/PC mi kontrolü
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

            // iOS Safari click sorununu çözen ana tıklama olayı
            joinBtn.addEventListener('click', async (e) => {
                e.preventDefault(); // iOS çift tıklama sorununu çözer
                
                const channelName = channelInput.value.trim().toLowerCase() || 'genel';
                micErrorText.classList.add('hidden');
                
                // Güvenlik: https veya localhost kontrolü (iOS sıkıdır bu konuda)
                if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                    micErrorText.innerHTML = "🚨 <b>Güvenlik Hatası:</b> Mikrofon sadece HTTPS üzerinden çalışır. GitHub sayfanızın URL'sinde https:// yazdığından emin olun.";
                    micErrorText.classList.remove('hidden');
                    return;
                }

                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    micErrorText.innerHTML = "🚨 <b>Hata:</b> Cihazınız mikrofon kullanımını desteklemiyor veya izin reddedildi.";
                    micErrorText.classList.remove('hidden');
                    return;
                }

                try {
                    // Mikrofon iznini iste
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { 
                            echoCancellation: true, // Telsizdeki yankıyı keser
                            noiseSuppression: true 
                        } 
                    });
                    
                    setupMediaRecorder(stream);
                    
                    if ("Notification" in window && Notification.permission !== "granted") {
                        Notification.requestPermission();
                    }
                    
                    loginScreen.classList.add('hidden');
                    radioScreen.classList.remove('hidden');
                    currentChannelDisplay.innerText = "Kanal: " + channelName.toUpperCase();
                    
                    connectToChannel(channelName);
                } catch (error) {
                    micErrorText.innerHTML = "<b>Mikrofon Hatası:</b> İzin verilmedi veya mikrofon kullanılamıyor. (iOS'ta Ayarlar -> Safari -> Mikrofon kısmını kontrol edin)";
                    micErrorText.classList.remove('hidden');
                }
            });

            const connectToChannel = (channelName) => {
                statusText.innerText = "Bağlanıyor...";
                statusText.className = "text-yellow-400 font-bold mt-4";
                
                // Ücretsiz, halka açık haberleşme sunucusu
                mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                currentTopic = "gtelsiz_v2_kanal_" + channelName.replace(/[^a-z0-9]/g, '');

                mqttClient.on('connect', () => {
                    mqttClient.subscribe(currentTopic);
                    statusText.innerText = "Dinleniyor...";
                    statusText.className = "text-green-400 font-bold mt-4";
                });

                mqttClient.on('message', (topic, message) => {
                    if (topic === currentTopic) {
                        try {
                            const data = JSON.parse(message.toString());
                            // Kendi sesimi yankılamaması için kontrol
                            if (data.senderId !== myClientId && data.audioBase64) {
                                playIncomingAudio(data.audioBase64);
                            }
                        } catch(e) {}
                    }
                });

                mqttClient.on('error', () => {
                    statusText.innerText = "Bağlantı koptu!";
                    statusText.className = "text-red-500 font-bold mt-4";
                });
            };

            const setupMediaRecorder = (stream) => {
                // iOS ve Android format uyumluluğu kontrolü
                let options = {};
                // Eğer iOS ise varsayılan mp4'ü, değilse webm'i kullan (boyut/hız için)
                if (MediaRecorder.isTypeSupported('audio/webm')) {
                    options = { mimeType: 'audio/webm' };
                } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
                    options = { mimeType: 'audio/mp4' }; // iOS Safari
                }
                
                mediaRecorder = new MediaRecorder(stream, options);
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    if (audioChunks.length === 0) return;
                    
                    const audioBlob = new Blob(audioChunks, { type: options.mimeType || 'audio/mp4' });
                    audioChunks = [];
                    
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        sendAudioData(reader.result);
                    };
                };
            };

            const sendAudioData = (base64data) => {
                if (!mqttClient || !mqttClient.connected) {
                    statusText.innerText = "Bağlantı yok!";
                    statusText.className = "text-red-500 font-bold mt-4";
                    return;
                }
                
                statusText.innerText = "Gönderiliyor...";
                statusText.className = "text-yellow-400 font-bold mt-4";
                
                const payload = JSON.stringify({
                    senderId: myClientId,
                    audioBase64: base64data
                });

                mqttClient.publish(currentTopic, payload, () => {
                    statusText.innerText = "Dinleniyor...";
                    statusText.className = "text-green-400 font-bold mt-4";
                });
            };

            const playIncomingAudio = (base64data) => {
                if (isPlaying) return;
                
                isPlaying = true;
                statusText.innerText = "Biri konuşuyor...";
                statusText.className = "text-blue-400 font-bold mt-4";
                
                audioPlayer.src = base64data;
                audioPlayer.play().catch(e => {
                    console.error("Çalma hatası", e);
                    // iOS'ta sessiz mod engeli hatası
                    isPlaying = false;
                    statusText.innerText = "Dinleniyor...";
                    statusText.className = "text-green-400 font-bold mt-4";
                });
                
                audioPlayer.onended = () => {
                    isPlaying = false;
                    statusText.innerText = "Dinleniyor...";
                    statusText.className = "text-green-400 font-bold mt-4";
                };
            };

            // --- Bas Konuş Butonu Olayları (iOS Uyumlu) ---
            const startTalking = (e) => {
                if (e.type === 'touchstart') e.preventDefault(); // Ekran kaymasını önle
                if (!mediaRecorder || isRecording || isPlaying) return;
                
                isRecording = true;
                pttBtn.classList.add('active');
                statusText.innerText = "Konuşuyorsunuz...";
                statusText.className = "text-red-400 font-bold mt-4";
                audioChunks = [];
                mediaRecorder.start();
            };

            const stopTalking = (e) => {
                if (e && e.type === 'touchend') e.preventDefault();
                if (!mediaRecorder || !isRecording) return;
                
                isRecording = false;
                pttBtn.classList.remove('active');
                mediaRecorder.stop();
            };

            // Fare (PC) Olayları
            pttBtn.addEventListener('mousedown', startTalking);
            window.addEventListener('mouseup', stopTalking);
            
            // Dokunmatik (Mobil/iOS) Olayları
            pttBtn.addEventListener('touchstart', startTalking, { passive: false });
            window.addEventListener('touchend', stopTalking, { passive: false });
            pttBtn.addEventListener('touchcancel', stopTalking); // Ekrandan parmak dışarı kayarsa

            leaveBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (mqttClient) mqttClient.end();
                radioScreen.classList.add('hidden');
                loginScreen.classList.remove('hidden');
                
                if (mediaRecorder && mediaRecorder.stream) {
                    mediaRecorder.stream.getTracks().forEach(track => track.stop());
                }
            });
        });
    </script>

    <div id="login-screen" class="flex-1 flex flex-col items-center justify-center p-6">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border border-gray-700">
            <i class="fa-solid fa-walkie-talkie text-5xl text-blue-500 mb-4"></i>
            <h1 class="text-2xl font-bold mb-6 text-white">Telsiz Frekansı</h1>
            
            <div class="mb-6">
                <label class="block text-gray-400 text-sm mb-2">Bağlanmak istediğiniz kanal adı:</label>
                <!-- onkeydown eklendi: mobilde enter'a basınca tetiklesin diye -->
                <input type="text" id="channel-input" value="1. Kanal" 
                       class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-center text-xl text-white focus:outline-none focus:border-blue-500 transition-colors"
                       placeholder="Örn: ekip, genel, kanka">
            </div>
            
            <!-- div tag'ine çevirdim çünkü iOS Safari form içindeki button elementlerini bazen gıcık algılayabiliyor -->
            <div id="join-btn"
                 class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-6 rounded-xl transition-colors cursor-pointer select-none">
                Kanala Bağlan
            </div>
            
            <p id="mic-error-text" class="hidden text-sm text-red-500 mt-4 font-bold bg-red-900/30 p-2 rounded"></p>
            <p class="text-xs text-gray-500 mt-4">Kullanım için mikrofon izni gereklidir.</p>
        </div>
    </div>

    <div id="radio-screen" class="hidden flex-1 flex flex-col bg-gray-900">
        <div class="bg-gray-800 p-4 flex justify-between items-center border-b border-gray-700 shadow-lg">
            <div id="current-channel" class="font-mono text-xl font-bold text-green-400">KANAL: --</div>
            <div id="leave-btn" class="text-gray-400 hover:text-white px-3 py-1 rounded bg-gray-700 cursor-pointer">
                <i class="fa-solid fa-power-off"></i> Çıkış
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center p-4">
            <div class="flex flex-wrap justify-center w-32 mb-12 opacity-50">
                <div class="speaker-hole"></div><div class="speaker-hole"></div><div class="speaker-hole"></div><div class="speaker-hole"></div>
                <div class="speaker-hole"></div><div class="speaker-hole"></div><div class="speaker-hole"></div><div class="speaker-hole"></div>
                <div class="speaker-hole"></div><div class="speaker-hole"></div><div class="speaker-hole"></div><div class="speaker-hole"></div>
            </div>

            <div class="relative w-48 h-48 flex items-center justify-center">
                <!-- iOS Safari için button yerine div kullandık ve dokunmatik olaylarını güçlendirdik -->
                <div id="ptt-btn" class="ptt-btn w-40 h-40 rounded-full flex flex-col items-center justify-center select-none relative z-10 border-4 border-red-900 focus:outline-none">
                    <div class="radar-ring"></div>
                    <i class="fa-solid fa-microphone text-4xl mb-2 text-white shadow-sm"></i>
                    <span class="font-bold text-sm tracking-wider uppercase">Bas Konuş</span>
                </div>
            </div>

            <div class="mt-12 text-center h-16">
                <div id="status-text" class="text-gray-500 font-bold mt-4 tracking-widest uppercase">Hazır</div>
            </div>
        </div>
    </div>
</body>
</html>
